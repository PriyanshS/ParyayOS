# Render Blueprint — CampusZero
# Deploy with: render.yaml in repo root
# Free tier: Web Service

services:
  - type: web
    name: campuszero
    runtime: node
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
    plan: free
    healthCheckPath: /api/auth/me
